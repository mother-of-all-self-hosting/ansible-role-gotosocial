---
- name: Fail if playbook called incorrectly for GoToSocial
  ansible.builtin.fail:
    msg: "The `username`, `password`, and `email` variables need to be provided via --extra-vars"
  when: >-
    username is not defined or username == 'USERNAME_HERE' or
    email is not defined or email == 'EMAIL_ADDRESS_HERE' or
    password is not defined or password == 'PASSWORD_HERE'

- name: Set the initial role to 'user' when running 'create-user-gotosocial' for GoToSocial
  ansible.builtin.set_fact:
    initial_role: user
  when: "'create-user-gotosocial' in ansible_run_tags"

- name: Set the initial role to 'admin' when running 'create-admin-gotosocial' for GoToSocial
  ansible.builtin.set_fact:
    initial_role: admin
  when: "'create-admin-gotosocial' in ansible_run_tags"

- name: Set user details for GoToSocial
  ansible.builtin.set_fact:
    user:
      username: "{{ username }}"
      initial_email: "{{ email }}"
      initial_password: "{{ password }}"
      initial_type: "{{ initial_role }}"
  no_log: true # hide raw password

- name: Ensure GoToSocial service is started
  ansible.builtin.service:
    name: "{{ gotosocial_identifier }}"
    state: started
    daemon_reload: true
  register: start_result

- name: Wait a while, so that the GoToSocial instance can manage to start
  ansible.builtin.pause:
    seconds: 7
  when: "start_result.changed"

- name: Ensure GoToSocial user is created
  ansible.builtin.include_tasks: "{{ role_path }}/tasks/util/ensure_user_registered.yml"
  no_log: true
