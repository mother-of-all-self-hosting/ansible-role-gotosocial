---
- name: Verify GoToSocial systemd service
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Wait for GoToSocial service to become active (up to 180s)
      ansible.builtin.systemd:
        name: gotosocial.service
      register: gotosocial_service
      until: gotosocial_service.status.ActiveState == 'active'
      retries: 36
      delay: 5

    - name: Assert GoToSocial service is active
      ansible.builtin.assert:
        that: gotosocial_service.status.ActiveState == 'active'
        fail_msg: "gotosocial.service not active ({{ gotosocial_service.status.ActiveState }})"
        success_msg: "gotosocial.service is active"

    - name: Retrieve GoToSocial service log for debugging
      when: gotosocial_debug_service_enabled | bool
      ansible.builtin.command:
        cmd: journalctl -xeu gotosocial.service
      changed_when: false

    - name: Wait for GoToSocial HTTP endpoint to respond (up to 10m)
      ansible.builtin.uri:
        url: "http://localhost:8080/"
        method: GET
        status_code: [200, 302]
        follow_redirects: none
      register: gotosocial_endpoint
      until: gotosocial_endpoint.status in [200, 302]
      retries: 120
      delay: 5

    - name: Assert GoToSocial HTTP endpoint responds
      ansible.builtin.assert:
        that: gotosocial_endpoint.status in [200, 302]
        fail_msg: "GoToSocial did not respond as expected ({{ gotosocial_endpoint.status | default('no response') }})"
        success_msg: "GoToSocial responded with {{ gotosocial_endpoint.status }}"

    - name: Show GoToSocial systemd service status summary
      ansible.builtin.debug:
        msg:
          - "GoToSocial systemd: {{ gotosocial_service.status.ActiveState }}"
          - "GoToSocial HTTP: {{ gotosocial_endpoint.status }}"
